---
- name: Installer Docker sur Linux (localhost ou Raspberry Pi OS 64 bits)
  hosts: localhost
  connection: local
  become: yes

  vars:
    docker_compose_version: "latest"

    rpm_distributions:
      - AlmaLinux
      - Fedora

    apt_distributions:
      - Debian
      - Ubuntu
      - Raspbian  # Ajouté pour Raspberry Pi OS

    docker_repo:
      AlmaLinux: centos
      Fedora: fedora

    docker_arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf  # Optionnel pour Raspberry Pi 32 bits (non utilisé ici)

    docker_arch: "{{ docker_arch_map.get(ansible_facts['architecture'], ansible_facts['architecture']) }}"

  tasks:

    - name: Vérifier la distribution cible
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] in rpm_distributions + apt_distributions
        fail_msg: "Ce playbook supporte uniquement AlmaLinux, Fedora, Debian, Ubuntu et Raspberry Pi OS (Raspbian)."
        success_msg: "Système compatible : {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }} (Architecture: {{ docker_arch }})"

    ###########################################################################
    # Mise à jour du système
    ###########################################################################

    - name: Mettre à jour les paquets (AlmaLinux/Fedora)
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: yes
      when: ansible_facts['distribution'] in rpm_distributions

    - name: Mettre à jour les paquets (Debian/Ubuntu/Raspbian)
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
      when: ansible_facts['distribution'] in apt_distributions

    ###########################################################################
    # Dépendances
    ###########################################################################

    - name: Installer les dépendances nécessaires (AlmaLinux/Fedora)
      ansible.builtin.dnf:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3
          - python3-pip
          - python3-devel
          - gcc
          - git
        state: present
      when: ansible_facts['distribution'] in rpm_distributions

    - name: Installer les dépendances nécessaires (Debian/Ubuntu/Raspbian)
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3
          - python3-pip
          - python3-dev
          - python3-venv  # Ajouté pour les environnements Python modernes
          - gcc
          - git
        state: present
      when: ansible_facts['distribution'] in apt_distributions

    ###########################################################################
    # Clés GPG Docker
    ###########################################################################

    - name: Ajouter la clé GPG Docker (AlmaLinux/Fedora)
      ansible.builtin.rpm_key:
        state: present
        key: https://download.docker.com/linux/centos/gpg
      when: ansible_facts['distribution'] in rpm_distributions

    - name: Télécharger la clé GPG Docker (Debian/Ubuntu/Raspbian)
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
        dest: /usr/share/keyrings/docker.asc
        mode: "0644"
      when: ansible_facts['distribution'] in apt_distributions

    ###########################################################################
    # Dépôts Docker
    ###########################################################################

    - name: Ajouter le dépôt Docker CE (AlmaLinux/Fedora)
      ansible.builtin.yum_repository:
        name: docker-ce
        description: Docker CE Repository
        baseurl: "https://download.docker.com/linux/{{ docker_repo[ansible_facts['distribution']] }}/$releasever/$basearch/stable"
        enabled: yes
        gpgcheck: yes
        gpgkey: "https://download.docker.com/linux/{{ docker_repo[ansible_facts['distribution']] }}/gpg"
      when: ansible_facts['distribution'] in rpm_distributions

    - name: Ajouter le dépôt Docker CE (Debian/Ubuntu/Raspbian)
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ docker_arch }}
          signed-by=/usr/share/keyrings/docker.asc]
          https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
          {{ ansible_facts['distribution_release'] }}
          stable
        state: present
        filename: docker
      when: ansible_facts['distribution'] in apt_distributions

    ###########################################################################
    # Installation Docker
    ###########################################################################

    - name: Installer Docker CE et Docker Compose (AlmaLinux/Fedora)
      ansible.builtin.dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest
      when: ansible_facts['distribution'] in rpm_distributions

    - name: Installer Docker CE et Docker Compose (Debian/Ubuntu/Raspbian)
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest
        update_cache: yes
      when: ansible_facts['distribution'] in apt_distributions

    ###########################################################################
    # Service Docker
    ###########################################################################

    - name: Démarrer et activer le service Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    ###########################################################################
    # Groupe docker
    ###########################################################################

    - name: Ajouter l'utilisateur courant au groupe docker
      ansible.builtin.user:
        name: "{{ lookup('env', 'SUDO_USER') | default(ansible_facts['user_id'], true) }}"
        groups: docker
        append: yes

    ###########################################################################
    # Vérifications
    ###########################################################################

    - name: Vérifier l'installation de Docker
      ansible.builtin.command: docker --version
      register: docker_version_output
      changed_when: false

    - name: Vérifier Docker Compose
      ansible.builtin.command: docker compose version
      register: docker_compose_version_output
      changed_when: false

    ###########################################################################
    # Résumé
    ###########################################################################

    - name: Afficher les versions installées
      ansible.builtin.debug:
        msg:
          - "Système : {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"
          - "Architecture : {{ docker_arch }}"
          - "Docker : {{ docker_version_output.stdout }}"
          - "Docker Compose : {{ docker_compose_version_output.stdout }}"
          - "✅ Installation Docker terminée avec succès sur {{ ansible_facts['distribution'] }}"