---
- name: Installer Docker sur AlmaLinux ou Debian (localhost)
  hosts: localhost
  connection: local
  become: yes
  vars:
    docker_compose_version: "latest"  # Non utilisé (plugin intégré)

  tasks:
    - name: Vérifier la distribution cible
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] in ["AlmaLinux", "Debian"]
        fail_msg: "Ce playbook supporte uniquement AlmaLinux ou Debian"
        success_msg: "Système compatible : {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"

    - name: Mettre à jour les paquets (AlmaLinux)
      dnf:
        name: "*"
        state: latest
        update_cache: yes
      when: ansible_facts['distribution'] == "AlmaLinux"

    - name: Mettre à jour les paquets (Debian)
      apt:
        update_cache: yes
        upgrade: dist
      when: ansible_facts['distribution'] == "Debian"

    - name: Installer les dépendances nécessaires (AlmaLinux)
      dnf:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3
          - python3-pip
          - python3-devel
          - gcc
          - git
        state: present
      when: ansible_facts['distribution'] == "AlmaLinux"

    - name: Installer les dépendances nécessaires (Debian)
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3
          - python3-pip
          - python3-dev
          - gcc
          - git
        state: present
      when: ansible_facts['distribution'] == "Debian"

    - name: Ajouter la clé GPG Docker (AlmaLinux)
      ansible.builtin.rpm_key:
        state: present
        key: https://download.docker.com/linux/centos/gpg
      when: ansible_facts['distribution'] == "AlmaLinux"

    - name: Ajouter la clé GPG Docker (Debian)
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/debian/gpg
        state: present
      when: ansible_facts['distribution'] == "Debian"

    - name: Ajouter le dépôt Docker CE (AlmaLinux)
      ansible.builtin.yum_repository:
        name: docker-ce
        description: Docker CE Repository
        baseurl: https://download.docker.com/linux/centos/$releasever/$basearch/stable
        gpgcheck: yes
        gpgkey: https://download.docker.com/linux/centos/gpg
        enabled: yes
      when: ansible_facts['distribution'] == "AlmaLinux"

    - name: Ajouter le dépôt Docker CE (Debian)
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_facts['architecture'] }}] https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker
      when: ansible_facts['distribution'] == "Debian"

    - name: Installer Docker CE et Docker Compose (AlmaLinux)
      dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest
      when: ansible_facts['distribution'] == "AlmaLinux"

    - name: Installer Docker CE et Docker Compose (Debian)
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest
        update_cache: yes
      when: ansible_facts['distribution'] == "Debian"

    - name: Démarrer et activer le service Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Ajouter l'utilisateur courant au groupe docker
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: yes

    - name: Vérifier l'installation de Docker
      ansible.builtin.command: docker --version
      register: docker_version_output
      changed_when: false

    - name: Vérifier Docker Compose (plugin intégré)
      ansible.builtin.command: docker compose version
      register: docker_compose_version_output
      changed_when: false

    - name: Afficher les versions installées
      ansible.builtin.debug:
        msg:
          - "Distribution: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"
          - "Docker version: {{ docker_version_output.stdout }}"
          - "Docker Compose version: {{ docker_compose_version_output.stdout }}"
