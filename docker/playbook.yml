---
- name: Installer Docker sur AlmaLinux (localhost)
  hosts: localhost
  connection: local
  become: yes
  vars:
    docker_compose_version: "latest"  # "latest" ou une version spécifique comme "v2.20.3"

  tasks:
    - name: Vérifier que le système est AlmaLinux
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] == "AlmaLinux"
        fail_msg: "Ce playbook est conçu uniquement pour AlmaLinux"
        success_msg: "Système compatible : AlmaLinux {{ ansible_facts['distribution_version'] }}"

    - name: Mettre à jour tous les paquets
      dnf:
        name: "*"
        state: latest
        update_cache: yes

    - name: Installer les dépendances nécessaires
      dnf:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3-pip
          - python3-devel
          - gcc
        state: present

    - name: Ajouter la clé GPG officielle de Docker
      ansible.builtin.rpm_key:
        state: present
        key: https://download.docker.com/linux/centos/gpg

    - name: Ajouter le dépôt Docker CE
      ansible.builtin.yum_repository:
        name: docker-ce
        description: Docker CE Repository
        baseurl: https://download.docker.com/linux/centos/$releasever/$basearch/stable
        gpgcheck: yes
        gpgkey: https://download.docker.com/linux/centos/gpg
        enabled: yes

    - name: Installer Docker CE (dernière version)
      dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: latest

    - name: Démarrer et activer le service Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Ajouter l'utilisateur courant au groupe docker
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: yes

    - name: Installer Docker Compose (dernière version)
      block:
        - name: Installer via pip (recommandé pour Docker Compose v2)
          ansible.builtin.pip:
            name: docker-compose
            executable: pip3
            state: latest
      when: docker_compose_version == "latest"

    - name: Vérifier l'installation de Docker
      ansible.builtin.command: docker --version
      register: docker_version_output
      changed_when: false

    - name: Vérifier Docker Compose
      ansible.builtin.command: docker compose version
      register: docker_compose_version_output
      changed_when: false

    - name: Afficher les versions installées
      ansible.builtin.debug:
        msg:
          - "Docker version: {{ docker_version_output.stdout }}"
          - "Docker Compose version: {{ docker_compose_version_output.stdout }}"
