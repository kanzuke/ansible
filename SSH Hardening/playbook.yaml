---
- name: "Sécurisation SSH - localhost"
  hosts: localhost
  connection: local
  become: true
  vars_files:
    - vars/main.yml

  # =========================================================
  # VARIABLES CALCULÉES
  # =========================================================
  vars:
    # Nom du service SSH selon la distribution
    ssh_service: >-
      {{ 'ssh' if ansible_distribution in ['Debian', 'Ubuntu'] else 'sshd' }}

    # Gestionnaire de paquets selon la distribution
    is_debian_based: "{{ ansible_distribution in ['Debian', 'Ubuntu'] }}"
    is_rhel_based: "{{ ansible_distribution in ['AlmaLinux', 'Rocky', 'CentOS', 'RedHat'] }}"

  # =========================================================
  # PRE-TASKS
  # =========================================================
  pre_tasks:
    - name: "Vérifier que la distribution est supportée"
      ansible.builtin.assert:
        that:
          - ansible_distribution in ['Debian', 'Ubuntu', 'AlmaLinux', 'Rocky', 'CentOS', 'RedHat']
        fail_msg: >
          Distribution non supportée : {{ ansible_distribution }}.
          Ce playbook supporte Debian, Ubuntu, AlmaLinux, Rocky, CentOS, RedHat.
        success_msg: "✅ Distribution supportée : {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: "Vérifier que le port SSH choisi est valide"
      ansible.builtin.assert:
        that:
          - ssh_port | int > 1024
          - ssh_port | int < 65535
        fail_msg: "Le port {{ ssh_port }} est invalide. Choisissez un port entre 1025 et 65534."
        success_msg: "✅ Port SSH valide : {{ ssh_port }}"

    - name: "Afficher le résumé de la configuration"
      ansible.builtin.debug:
        msg:
          - "Distribution  : {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Port SSH      : {{ ssh_port }}"
          - "Ban après     : {{ fail2ban_maxretry }} tentatives"
          - "Durée du ban  : {{ fail2ban_bantime }}s"
          - "Fenêtre       : {{ fail2ban_findtime }}s"

  # =========================================================
  # TASKS
  # =========================================================
  tasks:

    # ---------------------------------------------------------
    # INSTALLATION DES PAQUETS
    # ---------------------------------------------------------
    - name: "=== INSTALLATION - Debian/Ubuntu ==="
      when: is_debian_based | bool
      block:
        - name: "[Debian] Mettre à jour le cache APT"
          ansible.builtin.apt:
            update_cache: true
            cache_valid_time: 3600

        - name: "[Debian] Installer openssh-server, fail2ban, iptables"
          ansible.builtin.apt:
            name:
              - openssh-server
              - fail2ban
              - iptables
              - python3-systemd
            state: present

    - name: "=== INSTALLATION - AlmaLinux/Rocky/RHEL ==="
      when: is_rhel_based | bool
      block:
        - name: "[RHEL] Installer openssh-server, fail2ban, iptables"
          ansible.builtin.dnf:
            name:
              - openssh-server
              - fail2ban
              - fail2ban-systemd
              - iptables
              - python3-systemd
            state: present

        - name: "[RHEL] Configurer SELinux pour autoriser le port {{ ssh_port }}"
          community.general.seport:
            ports: "{{ ssh_port }}"
            proto: tcp
            setype: ssh_port_t
            state: present
          when: ansible_selinux.status is defined and ansible_selinux.status == 'enabled'

        - name: "[RHEL] Ouvrir le port {{ ssh_port }} dans firewalld"
          ansible.posix.firewalld:
            port: "{{ ssh_port }}/tcp"
            permanent: true
            state: enabled
            immediate: true
          ignore_errors: true

    # ---------------------------------------------------------
    # CONFIGURATION SSH
    # ---------------------------------------------------------
    - name: "=== CONFIGURATION SSHD ==="
      block:
        - name: "Sauvegarder sshd_config"
          ansible.builtin.copy:
            src: /etc/ssh/sshd_config
            dest: "/etc/ssh/sshd_config.bak-{{ ansible_date_time.date }}"
            remote_src: true
            owner: root
            group: root
            mode: "0600"

        - name: "Déployer la nouvelle configuration sshd_config"
          ansible.builtin.template:
            src: templates/sshd_config.j2
            dest: /etc/ssh/sshd_config
            owner: root
            group: root
            mode: "0600"
            validate: "/usr/sbin/sshd -t -f %s"
          notify: Redémarrer SSH

    # ---------------------------------------------------------
    # CONFIGURATION FAIL2BAN
    # ---------------------------------------------------------
    - name: "=== CONFIGURATION FAIL2BAN ==="
      block:
        - name: "Déployer jail.local"
          ansible.builtin.template:
            src: templates/jail.local.j2
            dest: /etc/fail2ban/jail.local
            owner: root
            group: root
            mode: "0644"
          notify: Redémarrer Fail2ban

        - name: "Activer et démarrer fail2ban"
          ansible.builtin.systemd:
            name: fail2ban
            enabled: true
            state: started

    # ---------------------------------------------------------
    # ACTIVATION SSH
    # ---------------------------------------------------------
    - name: "Activer et démarrer le service SSH"
      ansible.builtin.systemd:
        name: "{{ ssh_service }}"
        enabled: true
        state: started

    # ---------------------------------------------------------
    # VÉRIFICATIONS FINALES
    # ---------------------------------------------------------
    - name: "=== VÉRIFICATIONS FINALES ==="
      block:
        - name: "Vérifier que sshd écoute sur le port {{ ssh_port }}"
          ansible.builtin.wait_for:
            port: "{{ ssh_port }}"
            host: "127.0.0.1"
            timeout: 30

        - name: "Vérifier le statut de fail2ban (jail sshd)"
          ansible.builtin.command: fail2ban-client status sshd
          register: fail2ban_status
          changed_when: false
          failed_when: fail2ban_status.rc != 0

        - name: "Afficher le statut fail2ban"
          ansible.builtin.debug:
            var: fail2ban_status.stdout_lines

        - name: "Résumé final"
          ansible.builtin.debug:
            msg:
              - "================================================"
              - " Sécurisation SSH terminée avec succès ✅"
              - "================================================"
              - " Port SSH           : {{ ssh_port }}"
              - " X11 Forwarding     : désactivé"
              - " TCP Forwarding     : désactivé"
              - " Agent Forwarding   : désactivé"
              - " Tunneling          : désactivé"
              - " Fail2ban           : actif"
              - " Ban après          : {{ fail2ban_maxretry }} tentatives"
              - " Durée du ban       : {{ fail2ban_bantime }}s"
              - " Fenêtre détection  : {{ fail2ban_findtime }}s"
              - "================================================"
              - " ⚠️  Reconnectez-vous avec : ssh -p {{ ssh_port }} user@host"
              - "================================================"

  # =========================================================
  # HANDLERS
  # =========================================================
  handlers:
    - name: Redémarrer SSH
      ansible.builtin.systemd:
        name: "{{ ssh_service }}"
        state: restarted

    - name: Redémarrer Fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted
