---
- name: Vérification OS supporté
  ansible.builtin.assert:
    that:
      - ansible_os_family in ['Debian', 'RedHat']
    fail_msg: "OS non supporté : {{ ansible_os_family }}"

- name: Déploiement de la configuration SSH
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: restart sshd

- name: Configuration firewall Debian
  include_tasks: firewall_debian.yml
  when: ansible_os_family == "Debian"

- name: Configuration firewall RedHat
  include_tasks: firewall_redhat.yml
  when: ansible_os_family == "RedHat"