---
- name: Installer et configurer ZeroTier sur Linux
  hosts: localhost
  connection: local
  become: yes
  vars_prompt:
    - name: zerotier_network_id
      prompt: "Entrez l'ID du réseau ZeroTier à rejoindre (ex: 8056c34xxxxxxxxxx)"
      private: no

  vars:
    # Distributions supportées
    supported_distributions:
      - Debian
      - Ubuntu
      - Raspbian
      - Fedora
      - AlmaLinux

    # Commande de jointure réseau
    zerotier_join_cmd: "zerotier-cli join {{ zerotier_network_id }}"

  tasks:
    - name: Vérifier la distribution cible
      ansible.builtin.assert:
        that:
          - ansible_facts['distribution'] in supported_distributions
        fail_msg: "❌ Distribution non supportée: {{ ansible_facts['distribution'] }}. Ce playbook supporte uniquement Debian, Ubuntu, Raspbian, Fedora et AlmaLinux."
        success_msg: "✅ Système compatible: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"

    ###########################################################################
    # Installation via méthode officielle ZeroTier
    ###########################################################################
    - name: Installer ZeroTier One (méthode officielle)
      ansible.builtin.shell: |
        curl -s https://install.zerotier.com | sudo bash
      args:
        executable: /bin/bash
      register: zerotier_install
      changed_when: "'ZeroTier One installed' in zerotier_install.stdout"

    ###########################################################################
    # Démarrage et activation du service
    ###########################################################################
    - name: Démarrer et activer le service ZeroTier
      ansible.builtin.service:
        name: zerotier-one
        state: started
        enabled: yes

    ###########################################################################
    # Jointure au réseau
    ###########################################################################
    - name: Joindre le réseau ZeroTier
      ansible.builtin.command: "{{ zerotier_join_cmd }}"
      register: zerotier_join
      changed_when: "'OK' in zerotier_join.stdout"
      failed_when: zerotier_join.rc != 0 and "already a member" not in zerotier_join.stderr

    ###########################################################################
    # Vérification et informations
    ###########################################################################
    - name: Vérifier l'installation de ZeroTier
      ansible.builtin.command: zerotier-cli -v
      register: zerotier_version
      changed_when: false

    - name: Afficher les réseaux ZeroTier actifs
      ansible.builtin.command: zerotier-cli listnetworks
      register: zerotier_networks
      changed_when: false
      when: zerotier_join is changed or zerotier_join.rc == 0

    - name: Afficher les informations de configuration
      ansible.builtin.debug:
        msg:
          - "✅ ZeroTier installé avec succès !"
          - "Version: {{ zerotier_version.stdout }}"
          - "Réseau {{ zerotier_network_id }} ajouté."
          - ""
          - "Liste des réseaux ZeroTier actifs:"
          - "{{ zerotier_networks.stdout_lines | join('\n') }}"
          - ""
          - "Pour autoriser ce nœud dans le réseau ZeroTier:"
          - "1. Connectez-vous à https://my.zerotier.com"
          - "2. Allez dans 'Networks' > '{{ zerotier_network_id }}'"
          - "3. Autorisez le nouveau nœud dans la liste"